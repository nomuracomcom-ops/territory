<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>区域地図のカード</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@page { size: A4 landscape; margin: 8mm; }
*{box-sizing:border-box;}
html,body{margin:0;font-family:system-ui,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:#000;background:#e9e9e9;}
.bar{text-align:center;padding:10px;background:#1f2937;color:#fff;}
.bar button{font-size:15px;padding:8px 18px;border:none;border-radius:8px;background:#2ea043;color:#fff;font-weight:600;cursor:pointer;}
.bar .tip{display:block;margin-top:6px;font-size:12px;opacity:.85;}
.card{width:281mm;min-height:194mm;margin:10px auto;background:#fff;padding:6mm 9mm 5mm;}
.title{text-align:center;font-size:21pt;font-weight:700;letter-spacing:.05em;margin:1mm 0 5mm;}
.row{display:flex;align-items:flex-start;padding:0 4mm;margin-bottom:4mm;}
.row .lbl{font-weight:700;font-size:13pt;white-space:nowrap;}
.row .place{flex:1;text-align:center;}
.row .place .name{font-size:16pt;}
.row .place .sub{font-size:9pt;margin-top:1mm;}
.row .terr{font-weight:700;font-size:13pt;white-space:nowrap;}
.row .terr .num{font-size:16pt;margin-left:9mm;}
.maprow{position:relative;}
#map{width:100%;height:120mm;border:1px solid #000;background:#eee;}
.northarrow{position:absolute;top:6px;right:8px;z-index:600;width:34px;text-align:center;font-size:10px;color:#000;pointer-events:none;}
.northarrow svg{display:block;margin:0 auto;}
.qrwrap{position:absolute;right:6px;bottom:6px;z-index:600;background:rgba(255,255,255,.95);padding:4px 4px 2px;text-align:center;border:1px solid #ccc;}
.qrwrap #qr img,.qrwrap #qr canvas{display:block;}
.qrcap{font-size:6.5pt;margin-top:1px;line-height:1.2;width:96px;}
.envelope{font-size:11pt;line-height:1.8;margin:5mm 2mm 0;}
.formid{font-size:9pt;color:#333;margin:3mm 0 0 2mm;}
@media print{
  html,body{background:#fff;}
  .bar{display:none;}
  .card{width:auto;min-height:auto;margin:0;padding:0;}
}
</style>
</head>
<body>
<div class="bar">
  <button onclick="window.print()">🖨️ 印刷 / PDFで保存</button>
  <span class="tip">別の区域は、URL末尾の <b>?t=番号</b> を変えてください（例：card.html?t=2）</span>
</div>

<div class="card">
  <div class="title">区域地図のカード</div>
  <div class="row">
    <div class="lbl">場所</div>
    <div class="place">
      <div class="name" id="place">　</div>
      <div class="sub">（町名または地区）</div>
    </div>
    <div class="terr">区域番号<span class="num" id="num">　</span></div>
  </div>

  <div class="maprow">
    <div id="map"></div>
    <div class="northarrow">
      <svg width="22" height="30" viewBox="0 0 22 30"><polygon points="11,0 16,12 11,9 6,12" fill="#000"/><rect x="10" y="9" width="2" height="20" fill="#000"/></svg>
      北
    </div>
    <div class="qrwrap">
      <div id="qr"></div>
      <div class="qrcap">スマホで読み取ると電子地図が開きます</div>
    </div>
  </div>

  <div class="envelope">このカードはいつも封筒に入れておいてください。よごしたり，しるしをつけたり，折ったりしないようにしてください。この区域が網らされる度に，区域のファイルを管理している兄弟にそのことを知らせてください。</div>
  <div class="formid">S-12-J</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="territories.js"></script>
<script>
const T = (new URLSearchParams(location.search).get('t')||'1');
const D = (window.TERRITORIES && window.TERRITORIES[T]) || {name:'',boundary:[]};
document.getElementById('place').textContent = D.name || '';
document.getElementById('num').textContent = T;
document.title = '区域'+T+' 区域地図のカード（S-12）';

const map = L.map('map',{zoomControl:false,maxZoom:19,attributionControl:true}).setView([34.6437,136.1150],16);
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',{
  maxZoom:19, maxNativeZoom:18, attribution:"地理院地図（国土地理院）"
}).addTo(map);
L.control.scale({imperial:false, position:'bottomleft', maxWidth:120}).addTo(map);

if(D.boundary && D.boundary.length){
  const poly = L.polygon(D.boundary,{color:"#d9333f",weight:3,fillColor:"#d9333f",fillOpacity:.12}).addTo(map);
  map.fitBounds(poly.getBounds(),{padding:[26,26]});
}

const liveUrl = 'https://nomuracomcom-ops.github.io/territory/?t='+T;
new QRCode(document.getElementById('qr'),{text:liveUrl,width:96,height:96,correctLevel:QRCode.CorrectLevel.M});

setTimeout(function(){ map.invalidateSize(); }, 300);
</script>
</body>
</html>
