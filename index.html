<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1f6feb">
<title>区域1 桔梗が丘1番町A</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --grey:#8a8f98; --blue:#1f6feb; --red:#d9333f; --green:#2ea043;
    --bar:#1f2937; --panel:#ffffff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:system-ui,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;}
  #app{display:flex;flex-direction:column;height:100dvh;}
  header{background:var(--bar);color:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;}
  header .no{background:var(--blue);border-radius:6px;padding:2px 9px;font-weight:700;font-size:15px;}
  header .name{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  header .count{font-size:12px;opacity:.85;}
  #map{flex:1;width:100%;background:#e8e8e8;}
  .toolbar{position:absolute;left:10px;bottom:18px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
  .toolbar button{width:50px;height:50px;border:none;border-radius:50%;background:var(--panel);
    box-shadow:0 2px 8px rgba(0,0,0,.3);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .toolbar button.active{background:var(--blue);color:#fff;}
  .legend{position:absolute;right:10px;bottom:18px;z-index:1000;background:rgba(255,255,255,.94);
    border-radius:10px;padding:8px 10px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.2);line-height:1.7;}
  .legend .dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:5px;vertical-align:-1px;border:2px solid #fff;box-shadow:0 0 0 1px #aaa;}
  .hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(31,111,235,.95);
    color:#fff;padding:7px 14px;border-radius:20px;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;}
  .house-pin{border-radius:50%;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5);width:18px;height:18px;}
  .lp{min-width:190px;font-size:14px;}
  .lp h4{margin:0 0 6px;font-size:14px;}
  .lp .sts{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .lp .sts button{flex:1;min-width:56px;border:1px solid #ccc;border-radius:6px;padding:6px 4px;font-size:12px;background:#fff;cursor:pointer;}
  .lp .sts button.on{color:#fff;border-color:transparent;font-weight:700;}
  .lp textarea{width:100%;border:1px solid #ccc;border-radius:6px;padding:6px;font-size:13px;resize:vertical;min-height:38px;font-family:inherit;}
  .lp .gmap{display:block;text-align:center;margin-top:8px;background:#34a853;color:#fff;text-decoration:none;
    border-radius:6px;padding:8px;font-size:13px;font-weight:600;}
  .lp .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .lp .del{color:var(--red);background:none;border:none;font-size:13px;cursor:pointer;}
  .lp .date{font-size:11px;color:#888;}
  .sheet{position:absolute;inset:0;z-index:1100;background:rgba(0,0,0,.4);display:none;align-items:flex-end;}
  .sheet .card{background:#fff;width:100%;max-height:75%;overflow:auto;border-radius:16px 16px 0 0;padding:14px 16px 24px;}
  .sheet h3{margin:4px 0 12px;font-size:16px;display:flex;justify-content:space-between;}
  .sheet h3 .x{color:#888;cursor:pointer;}
  .litem{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #eee;font-size:14px;cursor:pointer;}
  .litem .memo{color:#666;font-size:12px;}
  .litem .badge{font-size:11px;padding:2px 7px;border-radius:10px;color:#fff;margin-left:auto;white-space:nowrap;}
  .empty{color:#999;text-align:center;padding:24px 0;font-size:13px;}
  .sheet .tools{display:flex;gap:8px;margin-top:14px;}
  .sheet .tools button{flex:1;border:1px solid #ccc;background:#fff;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;}
  .bulk{margin-top:16px;border-top:1px solid #eee;padding-top:12px;}
  .bulk-t{font-size:12px;color:#666;margin-bottom:8px;}
  .bulk-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .bulk-btns button{color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="no">区域 1</span>
    <span class="name">桔梗が丘1番町A</span>
    <span class="count" id="count">0件</span>
  </header>
  <div id="map"></div>
</div>

<div class="hint" id="hint">地図をタップして家を記録</div>
<div class="toolbar">
  <button id="btnLoc" title="現在地">📍</button>
  <button id="btnAdd" title="家を追加">➕</button>
  <button id="btnList" title="一覧">📋</button>
</div>
<div class="legend">
  <span class="dot" style="background:var(--grey)"></span>不在<br>
  <span class="dot" style="background:var(--blue)"></span>再訪問<br>
  <span class="dot" style="background:var(--red)"></span>訪問しない<br>
  <span class="dot" style="background:var(--green)"></span>済
</div>

<div class="sheet" id="sheet">
  <div class="card">
    <h3>記録一覧 <span class="x" id="sheetX">✕</span></h3>
    <div id="listBody"></div>
    <div class="bulk">
      <div class="bulk-t">種類ごとに一括削除（区域を渡すときなどに）</div>
      <div class="bulk-btns">
        <button data-s="done" style="background:#2ea043">済を全部消す</button>
        <button data-s="absent" style="background:#8a8f98">不在を全部消す</button>
        <button data-s="revisit" style="background:#1f6feb">再訪問を全部消す</button>
        <button data-s="dnc" style="background:#d9333f">訪問しないを全部消す</button>
      </div>
    </div>
    <div class="tools">
      <button id="btnExport">バックアップ書き出し</button>
      <button id="btnImport">読み込み</button>
    </div>
    <input type="file" id="fileIn" accept="application/json" style="display:none">
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const TERR_ID = "terr-1-kikyogaoka-1banchoA";
const STATUSES = {
  absent:{label:"不在", color:"#8a8f98"},
  revisit:{label:"再訪問", color:"#1f6feb"},
  dnc:{label:"訪問しない", color:"#d9333f"},
  done:{label:"済", color:"#2ea043"}
};
const ORDER = ["absent","revisit","dnc","done"];

// 区域境界（KML由来 / lng,lat → lat,lng に変換）
const BOUNDARY = [
  [34.644431652137904,136.1164212226868],
  [34.64508922884992,136.11488699913028],
  [34.64268397324679,136.11359953880313],
  [34.642229394165476,136.1150908470154]
];

// ---- 地図初期化（地理院地図タイル）----
const map = L.map('map',{zoomControl:false}).setView([34.6437,136.1150],17);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',{
  maxZoom:18, attribution:"地理院地図（国土地理院）"
}).addTo(map);
const poly = L.polygon(BOUNDARY,{color:"#d9333f",weight:3,fillColor:"#d9333f",fillOpacity:.10}).addTo(map);
map.fitBounds(poly.getBounds(),{padding:[40,40]});

// ---- データ ----
let houses = load();
let addMode = false;
let meMarker = null;

function load(){ try{return JSON.parse(localStorage.getItem(TERR_ID))||[]}catch(e){return []} }
function save(){ localStorage.setItem(TERR_ID, JSON.stringify(houses)); updateCount(); }
function updateCount(){ document.getElementById('count').textContent = houses.length+"件"; }

// ---- マーカー描画 ----
const layer = L.layerGroup().addTo(map);
function pinIcon(color){
  return L.divIcon({className:"",html:'<div class="house-pin" style="background:'+color+'"></div>',iconSize:[18,18],iconAnchor:[9,9]});
}
function render(){
  layer.clearLayers();
  houses.forEach(function(h){
    const m = L.marker([h.lat,h.lng],{icon:pinIcon(STATUSES[h.status].color)}).addTo(layer);
    m.bindPopup(function(){return popupHtml(h);},{closeButton:true});
    m.on('popupopen',function(e){bindPopup(e.popup, h, m);});
  });
  updateCount();
}
function popupHtml(h){
  const d = document.createElement('div'); d.className="lp";
  d.innerHTML = '<h4>家の記録</h4>'+
   '<div class="sts">'+ORDER.map(function(s){return '<button data-s="'+s+'" class="'+(h.status===s?'on':'')+'" style="'+(h.status===s?'background:'+STATUSES[s].color:'')+'">'+STATUSES[s].label+'</button>';}).join('')+'</div>'+
   '<textarea placeholder="メモ（号室・特徴など）">'+(h.memo||'')+'</textarea>'+
   '<a class="gmap" href="https://www.google.com/maps/dir/?api=1&destination='+h.lat+','+h.lng+'&travelmode=walking" target="_blank" rel="noopener">🗺️ Googleマップで経路案内</a>'+
   '<div class="row"><span class="date">'+(h.date||'')+'</span><button class="del">削除</button></div>';
  return d;
}
function bindPopup(popup, h, marker){
  const el = popup.getElement();
  el.querySelectorAll('.sts button').forEach(function(b){b.onclick=function(){
    h.status=b.dataset.s; h.date=today(); save();
    marker.setIcon(pinIcon(STATUSES[h.status].color));
    el.querySelectorAll('.sts button').forEach(function(x){x.classList.remove('on');x.style.background='';});
    b.classList.add('on'); b.style.background=STATUSES[h.status].color;
    el.querySelector('.date').textContent=h.date;
  };});
  el.querySelector('textarea').oninput=function(e){h.memo=e.target.value; save();};
  el.querySelector('.del').onclick=function(){
    houses=houses.filter(function(x){return x.id!==h.id;}); save(); render(); map.closePopup();
  };
}
function today(){ const d=new Date(); return (d.getMonth()+1)+'/'+d.getDate(); }

// ---- 操作 ----
document.getElementById('btnAdd').onclick=function(){
  addMode=!addMode; this.classList.toggle('active',addMode);
  document.getElementById('hint').style.display=addMode?'block':'none';
};
map.on('click',function(e){
  if(!addMode) return;
  const h={id:Date.now(), lat:e.latlng.lat, lng:e.latlng.lng, status:"absent", memo:"", date:today()};
  houses.push(h); save(); render();
  const m=layer.getLayers().slice(-1)[0]; if(m) m.openPopup();
});

document.getElementById('btnLoc').onclick=function(){
  const btn=this;
  if(!navigator.geolocation){alert('位置情報に対応していません');return;}
  btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(function(p){
    const ll=[p.coords.latitude,p.coords.longitude];
    if(!meMarker){
      meMarker=L.circleMarker(ll,{radius:8,color:'#fff',weight:3,fillColor:'#1f6feb',fillOpacity:1}).addTo(map);
    } else meMarker.setLatLng(ll);
    map.setView(ll,18); btn.textContent='📍';
  },function(err){alert('現在地を取得できませんでした');btn.textContent='📍';},{enableHighAccuracy:true,timeout:8000});
};

// ---- 一覧シート ----
const sheet=document.getElementById('sheet');
document.getElementById('btnList').onclick=function(){renderList();sheet.style.display='flex';};
document.getElementById('sheetX').onclick=function(){sheet.style.display='none';};
sheet.onclick=function(e){if(e.target===sheet)sheet.style.display='none';};
function renderList(){
  const b=document.getElementById('listBody');
  if(!houses.length){b.innerHTML='<div class="empty">まだ記録がありません。➕で家を追加できます。</div>';return;}
  b.innerHTML='';
  houses.slice().reverse().forEach(function(h){
    const s=STATUSES[h.status];
    const row=document.createElement('div');row.className='litem';
    row.innerHTML='<span class="dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+s.color+'"></span>'+
      '<span>'+(h.memo?escapeHtml(h.memo):'(メモなし)')+'<div class="memo">'+(h.date||'')+'</div></span>'+
      '<span class="badge" style="background:'+s.color+'">'+s.label+'</span>';
    row.onclick=function(){sheet.style.display='none';map.setView([h.lat,h.lng],18);
      layer.getLayers().forEach(function(m){const ll=m.getLatLng();if(Math.abs(ll.lat-h.lat)<1e-9&&Math.abs(ll.lng-h.lng)<1e-9)m.openPopup();});};
    b.appendChild(row);
  });
}
function escapeHtml(s){return s.replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

// ---- 種類ごとに一括削除 ----
function clearByStatus(st){
  var n=houses.filter(function(h){return h.status===st;}).length;
  if(n===0){alert(STATUSES[st].label+'のピンはありません');return;}
  if(!confirm(STATUSES[st].label+'のピンを '+n+'件すべて消しますか？（元に戻せません）')) return;
  houses=houses.filter(function(h){return h.status!==st;}); save(); render(); renderList();
}
document.querySelectorAll('.bulk-btns button').forEach(function(b){
  b.onclick=function(){clearByStatus(b.dataset.s);};
});

// ---- バックアップ ----
document.getElementById('btnExport').onclick=function(){
  const blob=new Blob([JSON.stringify(houses,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='区域1_記録_'+new Date().toISOString().slice(0,10)+'.json';a.click();
};
document.getElementById('btnImport').onclick=function(){document.getElementById('fileIn').click();};
document.getElementById('fileIn').onchange=function(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=function(){try{const d=JSON.parse(r.result);if(Array.isArray(d)){houses=d;save();render();renderList();alert('読み込みました');}}catch(err){alert('読み込めませんでした');}};
  r.readAsText(f);
};

render();
setTimeout(function(){ map.invalidateSize(); }, 300);
</script>
</body>
</html>
